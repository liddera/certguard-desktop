name: Build Windows

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Verificar ícone
        run: |
          if (!(Test-Path "build/icon.ico")) {
            Write-Host "::error::Arquivo build/icon.ico não encontrado. Adicione o ícone antes de fazer build."
            exit 1
          }

      - name: Instalar dependências
        run: npm ci

      - name: Configurar variável de ambiente da API
        run: echo "VITE_API_URL=${{ vars.VITE_API_URL }}" | Out-File -FilePath .env -Encoding utf8

      - name: Rodar lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build do instalador Windows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build

      - name: Listar artefatos gerados
        run: |
          Get-ChildItem -Path release -Recurse -File | Select-Object FullName, Length

      - name: Upload instalador NSIS
        uses: actions/upload-artifact@v4
        with:
          name: certguard-windows-installer
          path: |
            release/**/*.exe
            !release/**/*.blockmap
            !release/**/*.yml
          if-no-files-found: error
          retention-days: 30

      - name: Anexar à Release (apenas em tags)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/**/*.exe
            !release/**/*.blockmap
            !release/**/*.yml
          generate_release_notes: true